<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #fbbc04;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --nav-height: 64px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg); color: var(--text);
            overflow: hidden;
        }

        #launcher {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; gap: 2.5rem;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        .header-section h1 {
            font-size: 3rem; margin: 0; letter-spacing: -1.5px;
            background: linear-gradient(to right, #818cf8, #fbbc04);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .card-container { display: flex; gap: 2rem; }

        .hub-card {
            background: var(--card-bg); border: 1px solid #334155;
            padding: 3rem 2rem; border-radius: 24px; width: 280px;
            text-align: center; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hub-card:hover { transform: translateY(-12px); box-shadow: 0 25px 30px -10px rgba(0, 0, 0, 0.5); }
        .hub-card.update:hover { border-color: var(--primary); }
        .hub-card.notes:hover { border-color: var(--secondary); }

        .update-title { color: var(--primary); }
        .notes-title { color: var(--secondary); }

        #viewer-container { display: none; height: 100vh; width: 100vw; flex-direction: column; }

        #nav-bar {
            height: var(--nav-height); background: #1e293b;
            border-bottom: 1px solid #334155; display: flex;
            align-items: center; padding: 0 24px; gap: 20px; z-index: 10000;
        }

        .brand-logo {
            font-weight: 700; font-size: 1.25rem; letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #fbbc04);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding-right: 15px; border-right: 1px solid #334155;
        }

        .btn-nav {
            padding: 8px 16px; background: #334155; color: white;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
        }

        .btn-nav:hover { background: var(--primary); }

        #app-frame { flex-grow: 1; width: 100%; border: none; }
    </style>
</head>
<body>

    <div id="launcher">
        <div class="header-section">
            <h1>Compliance Hub</h1>
            <p style="opacity: 0.7;">Select a module to begin</p>
        </div>
        
        <div class="card-container">
            <div class="hub-card update" onclick="openApp('updates.html')">
                <h2 class="update-title">Updates</h2>
                <p>Corporate portals and administrative directives.</p>
            </div>

            <div class="hub-card notes" onclick="openApp('SiloPlus.html')">
                <h2 class="notes-title">Notes</h2>
                <p>Knowledge base and internal documentation.</p>
            </div>
        </div>
    </div>

    <div id="viewer-container">
        <header id="nav-bar">
            <div class="brand-logo">Compliance Hub</div>
            <button class="btn-nav" onclick="goHome()">🏠 Home</button>
            <button id="toggle-btn" class="btn-nav" onclick="toggleBetween()">🔄 Switch</button>
        </header>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <script>
        const launcher = document.getElementById('launcher');
        const viewer = document.getElementById('viewer-container');
        const frame = document.getElementById('app-frame');
        const toggleBtn = document.getElementById('toggle-btn');
        let activeFile = '';

        function openApp(fileName) {
            activeFile = fileName;
            launcher.style.display = 'none';
            viewer.style.display = 'flex';
            frame.src = fileName;
            updateButtonText();
        }

        function toggleBetween() {
            activeFile = (activeFile === 'updates.html') ? 'SiloPlus.html' : 'updates.html';
            frame.src = activeFile;
            updateButtonText();
        }

        function updateButtonText() {
            toggleBtn.innerHTML = (activeFile === 'updates.html') 
                ? '🔄 Switch to Notes' : '🔄 Switch to Updates';
        }

        function goHome() {
            viewer.style.display = 'none';
            launcher.style.display = 'flex';
            frame.src = '';
        }
    </script>
</body>
</html>
